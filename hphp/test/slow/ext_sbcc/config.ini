; SBCC test config.
; The standalone sbcc-build binary supports -c/-v flags, but the test runner
; passes unit-cache-affecting flags (from hhvm_cmd_impl and config.opts) via
; -v to the builder separately. This config must NOT set options that affect
; CONFIGS_FOR_UNITCACHEFLAGS or RepoOptionsFlags::cacheKeySha1() (e.g.
; php7.all, Eval.EnableIntrinsicsExtension) — those are synchronized
; between builder and runtime by run.php's sbcc_mode_setup().
hhvm.error_handling.notice_frequency = 1
hhvm.error_handling.warning_frequency = 1
hhvm.hack.lang.auto_typecheck = false
hhvm.hack.lang.look_for_typechecker = false
